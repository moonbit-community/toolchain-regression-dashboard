# yaml-language-server: $schema=submodules.schema.json
schema_version: 1

defaults:
  matrix:
    os:
      - windows-x64
      - macos-arm64
      - linux-x64
    backends:
      - wasm
      - wasm-gc
      - js
      - native

  test:
    argv:
      - moon
      - test
      - --target
      - '{backend}'
    timeout_seconds: 1200

submodules:
  mooncakes/moonbit-community/html5-mbt: {}
  mooncakes/moonbit-community/pdf.mbt: {}
  mooncakes/moonbit-community/yaml.mbt: {}
  mooncakes/moonbit-community/sqlparser: {}
  # mooncakes/moonbit-community/harfbuzz.mbt: {}
  mooncakes/moonbit-community/sqlite3.mbt:
    matrix:
      exclude:
        - backend: wasm
        - backend: wasm-gc
        - backend: js
  mooncakes/moonbit-community/diago: {}
  mooncakes/moonbit-community/xml-mbt: {}
  mooncakes/moonbit-community/moonbit-jq: {}
  mooncakes/moonbit-community/cmark.mbt: {}
